<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NewAra">
<title>NewAraEnglish</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Roboto+Condensed:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --sky-top:#a8d8f0;--sky-mid:#c5e8f7;--sky-bot:#e8f6fe;
  --glass-bg:rgba(255,255,255,0.38);--glass-bg2:rgba(255,255,255,0.52);--glass-bdr:rgba(255,255,255,0.78);
  --text-dark:#1a3a4a;--text-mid:#2e6080;--text-light:#5b9ab8;
  --correct-bg:rgba(60,200,130,0.18);--correct-bdr:rgba(60,200,130,0.7);--correct-txt:#0a6e40;
  --wrong-bg:rgba(220,80,50,0.14);--wrong-bdr:rgba(220,80,50,0.6);--wrong-txt:#8b2010;
  --topbar-h: 54px;
  --tabbar-h: 68px;
}

html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Nunito',sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(180,220,255,0.7) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 10%,rgba(210,240,255,0.5) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(130,200,245,0.4) 0%,transparent 60%),
    linear-gradient(175deg,var(--sky-top) 0%,var(--sky-mid) 40%,var(--sky-bot) 100%);
  background-attachment:fixed;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  overflow:hidden;position:relative;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
body::before{width:340px;height:340px;top:-80px;right:-80px;background:radial-gradient(circle,rgba(180,230,255,0.55) 0%,transparent 70%);}
body::after{width:280px;height:280px;bottom:-60px;left:-60px;background:radial-gradient(circle,rgba(150,210,255,0.45) 0%,transparent 70%);}

/* ── BUBBLES ── */
.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.65),rgba(180,230,255,0.12));border:1px solid rgba(255,255,255,0.55);animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0;}10%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(-110vh) scale(1.1);opacity:0;}}

/* ══════════════════════════════
   TOP BAR — NewAra logo only
══════════════════════════════ */
.topbar{
  position:relative;z-index:100;flex-shrink:0;
  height:var(--topbar-h);
  display:flex;align-items:center;
  padding:0 14px;gap:10px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.75);
  box-shadow:0 2px 16px rgba(100,180,230,0.15),0 1px 0 rgba(255,255,255,0.9) inset;
}
.topbar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);pointer-events:none;}

.newara-logo{
  font-family:'Roboto Condensed',sans-serif;
  font-weight:500;font-size:22px;flex-shrink:0;
  color:var(--text-dark);letter-spacing:0.5px;
  text-shadow:0 1px 2px rgba(255,255,255,0.9),0 2px 8px rgba(100,160,210,0.2);
  position:relative;z-index:1;
  cursor:pointer;
  padding:4px 8px;border-radius:10px;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.newara-logo:hover{background:rgba(255,255,255,0.4);}
.newara-logo:active{transform:scale(.95);}
.newara-logo span{
  background:linear-gradient(135deg,#2a72cc,#3dcb96);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* ══════════════════════════════
   MENU OVERLAY
══════════════════════════════ */
.menu-overlay{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:flex-start;justify-content:flex-start;
  padding-top:calc(var(--topbar-h) + 8px);
  padding-left:14px;
  background:rgba(180,220,245,0.18);
  backdrop-filter:blur(6px);
  animation:menuFadeIn .18s ease;
}
.menu-overlay.open{display:flex;}
@keyframes menuFadeIn{from{opacity:0;}to{opacity:1;}}

.menu-panel{
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:20px;
  padding:10px;
  min-width:220px;
  backdrop-filter:blur(24px);
  box-shadow:0 12px 40px rgba(80,140,210,0.22),0 1.5px 0 rgba(255,255,255,0.95) inset;
  position:relative;overflow:hidden;
  animation:menuSlideIn .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes menuSlideIn{from{opacity:0;transform:translateY(-8px) scale(.97);}to{opacity:1;transform:none;}}
.menu-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.55),transparent);pointer-events:none;border-radius:20px 20px 0 0;}

.menu-title{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-light);padding:4px 10px 8px;
  text-shadow:0 1px 0 rgba(255,255,255,0.7);
}
.menu-item{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:11px 12px;border-radius:13px;border:none;
  background:transparent;cursor:pointer;
  font-family:'Nunito',sans-serif;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  position:relative;z-index:1;
}
.menu-item:hover{background:rgba(255,255,255,0.6);}
.menu-item:active{transform:scale(.97);}
.menu-item-icon{
  width:36px;height:36px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:0 2px 6px rgba(0,0,0,0.1),0 1px 0 rgba(255,255,255,0.8) inset;
  position:relative;overflow:hidden;
}
.menu-item-icon::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);border-radius:11px 11px 0 0;}
.menu-item-text{text-align:left;}
.menu-item-label{font-size:14px;font-weight:800;color:var(--text-dark);display:block;text-shadow:0 1px 0 rgba(255,255,255,0.7);}
.menu-item-sub  {font-size:11px;font-weight:600;color:var(--text-light);display:block;}
.menu-sep{height:1px;background:rgba(200,220,235,0.5);margin:6px 4px;}

.mi-sen .menu-item-icon{background:linear-gradient(135deg,#8e7ff0,#5a4bc4);box-shadow:0 3px 10px rgba(106,90,224,0.35),0 1px 0 rgba(255,255,255,0.4) inset;}
.mi-tq  .menu-item-icon{background:linear-gradient(135deg,#5ba3e8,#2a72cc);box-shadow:0 3px 10px rgba(42,114,204,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;}
.mi-ex  .menu-item-icon{background:linear-gradient(135deg,#3dcb96,#0a8f60);box-shadow:0 3px 10px rgba(10,143,96,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;}
.mi-iv  .menu-item-icon{background:linear-gradient(135deg,#f5a742,#e06a0a);box-shadow:0 3px 10px rgba(224,106,10,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;}
.mi-geo .menu-item-icon{background:linear-gradient(135deg,#3dcb96,#0a6e40);box-shadow:0 3px 10px rgba(10,110,64,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;}

.menu-download{
  width:100%;margin-top:6px;padding:11px 14px;border-radius:13px;border:none;
  background:linear-gradient(150deg,#5ba3e8,#2a72cc);
  color:#fff;font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 14px rgba(42,114,204,0.35),0 1px 0 rgba(255,255,255,0.35) inset;
  position:relative;overflow:hidden;text-decoration:none;
}
.menu-download::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:13px 13px 0 0;}
.menu-download:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(42,114,204,0.45),0 1px 0 rgba(255,255,255,0.35) inset;}
.menu-download:active{transform:scale(.97);}
.menu-goto{width:100%;margin-top:6px;padding:11px 14px;border-radius:13px;border:none;color:#fff;font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;text-decoration:none;}
.menu-goto::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:13px 13px 0 0;}
.menu-goto:hover{transform:translateY(-1px);}
.menu-goto:active{transform:scale(.97);}
.menu-goto-geo{background:linear-gradient(150deg,#3dcb96,#0a8f60);box-shadow:0 4px 14px rgba(10,143,96,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}
.menu-goto-eng{background:linear-gradient(150deg,#8e7ff0,#5a4bc4);box-shadow:0 4px 14px rgba(106,90,224,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}
.menu-goto-fec{background:linear-gradient(150deg,#e74c3c,#9b59b6);box-shadow:0 4px 14px rgba(155,89,182,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}

.topbar-divider{width:1px;height:26px;background:rgba(255,255,255,0.6);border-left:1px solid rgba(100,160,200,0.2);flex-shrink:0;position:relative;z-index:1;}
.topbar-pages{display:flex;gap:6px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative;z-index:1;}
.topbar-pages::-webkit-scrollbar{display:none;}
.page-btn{
  padding:7px 14px;border-radius:50px;border:none;
  font-size:12.5px;font-weight:700;font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden;
  opacity:.42;background:rgba(255,255,255,0.45);color:var(--text-mid);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:0 2px 6px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;
}
.page-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),rgba(255,255,255,0.1));border-radius:50px 50px 0 0;pointer-events:none;}
.page-btn.active{opacity:1;transform:translateY(-1px);color:#fff;border-color:rgba(255,255,255,0.4);}
.page-btn:active{transform:scale(.95);}
.page-btn.pb-sen.active{background:linear-gradient(150deg,#8e7ff0,#5a4bc4);box-shadow:0 4px 14px rgba(106,90,224,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.page-btn.pb-tq.active {background:linear-gradient(150deg,#5ba3e8,#2a72cc);box-shadow:0 4px 14px rgba(42,114,204,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.page-btn.pb-ex.active {background:linear-gradient(150deg,#3dcb96,#0a8f60);box-shadow:0 4px 14px rgba(10,143,96,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.page-btn.pb-iv.active {background:linear-gradient(150deg,#f5a742,#e06a0a);box-shadow:0 4px 14px rgba(224,106,10,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}



/* ── PAGE CONTAINERS ── */
.page{display:none;flex-direction:column;flex:1;overflow:hidden;}
.page.active{display:flex;}

/* ── SHARED SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;padding:14px 16px 30px;-webkit-overflow-scrolling:touch;position:relative;z-index:10;}

/* ══════════════════════════════
   PAGE HEADERS (inner nav)
══════════════════════════════ */
.page-header{position:relative;z-index:10;padding:12px 16px 0;flex-shrink:0;text-align:center;}
.page-title-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.42);border:1px solid var(--glass-bdr);border-radius:18px;padding:8px 18px;backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(100,180,230,0.18),0 1px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;}
.page-title-pill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);pointer-events:none;border-radius:18px 18px 0 0;}
.page-title-pill h2{font-size:16px;font-weight:800;color:var(--text-dark);letter-spacing:-.2px;text-shadow:0 1px 2px rgba(255,255,255,0.8);}
.page-subtitle{font-size:11px;color:var(--text-light);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}

.page-icon{width:24px;height:24px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.icon-sen{background:linear-gradient(135deg,#8e7ff0,#5a4bc4);box-shadow:0 2px 6px rgba(106,90,224,0.4);}
.icon-tq {background:linear-gradient(135deg,#5ba3e8,#2a72cc);box-shadow:0 2px 6px rgba(42,114,204,0.4);}
.icon-ex {background:linear-gradient(135deg,#3dcb96,#0a8f60);box-shadow:0 2px 6px rgba(10,143,96,0.4);}
.icon-iv {background:linear-gradient(135deg,#f5a742,#e06a0a);box-shadow:0 2px 6px rgba(224,106,10,0.4);}

/* ── INNER NAV (within each page) ── */
.inner-nav{display:flex;gap:8px;padding:12px 16px 0;justify-content:center;flex-wrap:wrap;flex-shrink:0;position:relative;z-index:10;}
.nav-btn{padding:8px 22px;border-radius:50px;border:none;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;opacity:.38;text-shadow:0 1px 2px rgba(0,0,0,0.2);white-space:nowrap;}
.nav-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),rgba(255,255,255,0.1));border-radius:50px 50px 0 0;pointer-events:none;}
.nav-btn.active{opacity:1;transform:translateY(-1px);}
.nav-btn:active{transform:scale(.96);}
/* so/either/neither */
.btn-so     {background:linear-gradient(170deg,#8e7ff0,#5a4bc4);color:#fff;box-shadow:0 4px 14px rgba(106,90,224,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
.btn-either {background:linear-gradient(170deg,#3dcb96,#0a8f60);color:#fff;box-shadow:0 4px 14px rgba(15,158,110,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
.btn-neither{background:linear-gradient(170deg,#f07040,#bf3a14);color:#fff;box-shadow:0 4px 14px rgba(212,74,30,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
/* tag q */
.btn-a{background:linear-gradient(150deg,#5ba3e8,#2a72cc);color:#fff;box-shadow:0 4px 14px rgba(42,114,204,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
.btn-b{background:linear-gradient(150deg,#f07040,#bf3a14);color:#fff;box-shadow:0 4px 14px rgba(191,58,20,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
.btn-e{background:linear-gradient(150deg,#3dcb96,#0a8f60);color:#fff;box-shadow:0 4px 14px rgba(10,143,96,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
/* irregular verbs */
.btn-flash{background:linear-gradient(150deg,#f5a742,#e06a0a);color:#fff;box-shadow:0 4px 14px rgba(224,106,10,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
.btn-table{background:linear-gradient(150deg,#5ba3e8,#2a72cc);color:#fff;box-shadow:0 4px 14px rgba(42,114,204,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
.btn-ex-iv{background:linear-gradient(150deg,#3dcb96,#0a8f60);color:#fff;box-shadow:0 4px 14px rgba(10,143,96,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}

/* ══════════════════════════════
   SHARED COMPONENTS
══════════════════════════════ */
.card{background:var(--glass-bg2);border:1px solid var(--glass-bdr);border-radius:22px;padding:1.35rem 1.25rem;backdrop-filter:blur(18px);box-shadow:0 8px 32px rgba(80,160,220,0.18),0 1.5px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;animation:cardIn .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:none;}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:44%;background:linear-gradient(to bottom,rgba(255,255,255,0.42),rgba(255,255,255,0.06));border-radius:22px 22px 60% 60%/22px 22px 30px 30px;pointer-events:none;}

.meaning-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:5px;text-shadow:0 1px 0 rgba(255,255,255,0.6);}
.meaning-text{font-size:16.5px;font-weight:800;color:var(--text-dark);margin-bottom:1rem;line-height:1.45;text-shadow:0 1px 0 rgba(255,255,255,0.7);}

.word-header{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.word-title{font-size:34px;font-weight:800;color:var(--text-dark);text-shadow:0 2px 0 rgba(255,255,255,0.8),0 4px 12px rgba(100,160,210,0.25);letter-spacing:-1px;}
.word-count{font-size:13px;color:var(--text-light);font-weight:600;background:rgba(255,255,255,0.5);padding:2px 9px;border-radius:20px;border:1px solid rgba(255,255,255,0.7);}
.subtitle{font-size:12.5px;color:var(--text-light);font-weight:600;margin-bottom:12px;text-shadow:0 1px 0 rgba(255,255,255,0.7);}

.progress{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(180,210,230,0.4);border:1px solid rgba(255,255,255,0.6);box-shadow:0 1px 3px rgba(100,160,200,0.2);transition:background .25s,transform .25s;flex-shrink:0;}
.dot.active,.dot.active-dot{transform:scale(1.35);}

.sense-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.sense-tab{padding:6px 14px;border-radius:50px;font-size:12.5px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;background:rgba(255,255,255,0.38);border:1px solid rgba(255,255,255,0.75);color:var(--text-mid);backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(100,160,200,0.12),0 1px 0 rgba(255,255,255,0.8) inset;}
.sense-tab::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.55),transparent);border-radius:50px 50px 0 0;}
.sense-tab.active{color:#fff;border-color:rgba(255,255,255,0.4);box-shadow:0 3px 14px rgba(0,0,0,0.2),0 1px 0 rgba(255,255,255,0.4) inset;text-shadow:0 1px 2px rgba(0,0,0,0.25);}

.examples{display:flex;flex-direction:column;gap:8px;}
.pair{display:grid;grid-template-columns:1fr 1fr;border-radius:13px;overflow:hidden;border:1px solid rgba(255,255,255,0.7);box-shadow:0 3px 10px rgba(100,160,210,0.13),0 1px 0 rgba(255,255,255,0.6) inset;}
.en{padding:9px 12px;font-size:13px;line-height:1.6;font-weight:700;color:var(--text-dark);background:rgba(255,255,255,0.55);border-right:1px solid rgba(255,255,255,0.7);text-shadow:0 1px 0 rgba(255,255,255,0.8);}
.es{padding:9px 12px;font-size:13px;line-height:1.6;color:var(--text-mid);font-weight:600;background:rgba(255,255,255,0.28);text-shadow:0 1px 0 rgba(255,255,255,0.6);}

.neg-block{margin-top:12px;padding:11px 13px;border-radius:14px;background:rgba(255,255,255,0.38);border:1px solid rgba(255,255,255,0.75);box-shadow:0 2px 10px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.neg-block::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:14px 14px 0 0;}
.neg-title{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-light);margin-bottom:8px;}
.neg-row{display:flex;gap:10px;font-size:13px;color:var(--text-mid);margin-bottom:5px;flex-wrap:wrap;font-weight:600;}
.neg-en{color:var(--text-dark);min-width:140px;font-weight:700;}

.note-box{margin-top:13px;padding:10px 13px;border-radius:0 14px 14px 0;font-size:12.5px;color:var(--text-mid);line-height:1.65;font-weight:600;background:rgba(255,255,255,0.38);border:1px solid rgba(255,255,255,0.65);border-left-width:4px;box-shadow:0 2px 8px rgba(100,160,210,0.1);}

.schema-box{margin-bottom:1rem;padding:11px 14px;background:rgba(255,255,255,0.55);border-radius:14px;border:1px solid rgba(255,255,255,0.8);font-size:13px;color:var(--text-mid);line-height:1.75;font-weight:600;box-shadow:0 2px 8px rgba(100,160,210,0.12),0 1px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;}
.schema-box::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:14px 14px 0 0;pointer-events:none;}
.schema-box strong{color:var(--text-dark);font-weight:800;}
.body-text{font-size:13.5px;color:var(--text-mid);line-height:1.65;font-weight:600;margin-bottom:1rem;text-shadow:0 1px 0 rgba(255,255,255,0.5);}

.rule-list{display:flex;flex-direction:column;gap:9px;margin-bottom:1rem;}
.rule-item{padding:11px 13px;background:rgba(255,255,255,0.42);border-radius:14px;border:1px solid rgba(255,255,255,0.75);box-shadow:0 2px 8px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.rule-item::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(to bottom,rgba(255,255,255,0.38),transparent);border-radius:14px 14px 0 0;pointer-events:none;}
.rule-head{font-size:13px;font-weight:800;color:var(--text-dark);margin-bottom:4px;text-shadow:0 1px 0 rgba(255,255,255,0.7);}
.rule-body{font-size:12.5px;color:var(--text-mid);line-height:1.6;font-weight:600;}
.rule-ex{margin-top:6px;font-size:12px;color:var(--text-light);font-style:italic;font-weight:600;}

/* EXERCISE SHARED */
.type-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.6);box-shadow:0 1px 4px rgba(0,0,0,0.08),0 1px 0 rgba(255,255,255,0.7) inset;position:relative;overflow:hidden;}
.type-badge::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:20px 20px 0 0;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-mc  {background:rgba(91,163,232,0.18);color:#1a5c99;border-color:rgba(91,163,232,0.4);}
.badge-fill{background:rgba(106,90,224,0.15);color:#3a2ea0;border-color:rgba(106,90,224,0.4);}
.badge-tf  {background:rgba(61,203,150,0.18);color:#0a5e40;border-color:rgba(61,203,150,0.4);}
.badge-3   {background:rgba(245,167,66,0.2); color:#8a4800;border-color:rgba(245,167,66,0.5);}

.q-num{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.q-text{font-size:17px;font-weight:800;color:var(--text-dark);line-height:1.5;margin-bottom:1.1rem;text-shadow:0 1px 0 rgba(255,255,255,0.7);}

.options{display:flex;flex-direction:column;gap:8px;}
.opt-btn{width:100%;text-align:left;padding:11px 16px;border-radius:14px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.45);font-size:13.5px;font-weight:700;color:var(--text-dark);font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 8px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.opt-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:14px 14px 0 0;}
.opt-btn:hover:not(:disabled){background:rgba(255,255,255,0.65);transform:translateY(-1px);}
.opt-btn:disabled{cursor:default;}
.opt-btn.correct{background:var(--correct-bg);border-color:var(--correct-bdr);color:var(--correct-txt);}
.opt-btn.wrong  {background:var(--wrong-bg);  border-color:var(--wrong-bdr);  color:var(--wrong-txt);}
.opt-btn.reveal {background:rgba(255,255,255,0.25);color:var(--text-light);opacity:.65;}

.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tf-btn{padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,0.7);font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(100,160,210,0.12),0 1px 0 rgba(255,255,255,0.8) inset;}
.tf-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:16px 16px 0 0;}
.tf-true {background:rgba(91,163,232,0.18);color:#1a5c99;}
.tf-false{background:rgba(240,112,64,0.15);color:#8b3010;}
.tf-btn:hover:not(:disabled){transform:translateY(-2px);}
.tf-btn:disabled{cursor:default;}
.tf-btn.correct{background:var(--correct-bg);border-color:var(--correct-bdr);color:var(--correct-txt);}
.tf-btn.wrong  {background:var(--wrong-bg);  border-color:var(--wrong-bdr);  color:var(--wrong-txt);}

.fill-row{display:flex;gap:8px;align-items:stretch;}
.fill-input{flex:1;padding:11px 14px;border-radius:14px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.55);font-size:14px;font-weight:700;color:var(--text-dark);font-family:'Nunito',sans-serif;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;outline:none;transition:all .15s;}
.fill-input:focus{border-color:rgba(91,163,232,0.7);box-shadow:0 0 0 3px rgba(91,163,232,0.15);}
.fill-input.correct{border-color:var(--correct-bdr);background:var(--correct-bg);color:var(--correct-txt);}
.fill-input.wrong  {border-color:var(--wrong-bdr);  background:var(--wrong-bg);  color:var(--wrong-txt);}
.fill-input:disabled{cursor:default;}
.check-btn{padding:11px 16px;border-radius:14px;border:none;background:linear-gradient(150deg,#5ba3e8,#2a72cc);color:#fff;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(42,114,204,0.4),0 1px 0 rgba(255,255,255,0.35) inset;position:relative;overflow:hidden;white-space:nowrap;}
.check-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:14px 14px 0 0;}
.check-btn:hover{transform:translateY(-1px);}
.check-btn:disabled{opacity:.5;cursor:default;transform:none;}

.feedback{margin-top:11px;padding:10px 14px;border-radius:14px;font-size:13px;font-weight:700;line-height:1.6;border:1px solid;display:none;animation:fadeIn .2s ease;}
.feedback.show{display:block;}
.feedback.correct{background:var(--correct-bg);border-color:var(--correct-bdr);color:var(--correct-txt);}
.feedback.wrong  {background:var(--wrong-bg);  border-color:var(--wrong-bdr);  color:var(--wrong-txt);}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.next-btn{width:100%;margin-top:11px;padding:13px;border-radius:16px;border:none;background:linear-gradient(150deg,#3dcb96,#0a8f60);color:#fff;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(10,143,96,0.4),0 1px 0 rgba(255,255,255,0.35) inset;display:none;position:relative;overflow:hidden;animation:fadeIn .25s ease;}
.next-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:16px 16px 0 0;}
.next-btn.show{display:block;}
.next-btn:hover{transform:translateY(-2px);}

/* RESULTS */
.results{text-align:center;padding:1.5rem 1rem;animation:cardIn .35s cubic-bezier(.34,1.56,.64,1);}
.results-score{font-size:68px;font-weight:800;line-height:1;background:linear-gradient(135deg,#2a72cc,#3dcb96);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;filter:drop-shadow(0 2px 8px rgba(42,114,204,0.3));}
.results-label{font-size:15px;font-weight:700;color:var(--text-mid);margin-bottom:6px;}
.results-sub{font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:1.4rem;}
.results-stars{font-size:30px;margin-bottom:1.1rem;letter-spacing:4px;}
.breakdown{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;}
.pill{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,0.7);box-shadow:0 2px 8px rgba(100,160,210,0.12),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.pill::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:20px 20px 0 0;}
.pill-c{background:rgba(60,200,130,0.2);color:var(--correct-txt);}
.pill-w{background:rgba(220,80,50,0.15);color:var(--wrong-txt);}
.retry-btn{width:100%;padding:13px;border-radius:18px;border:none;background:linear-gradient(150deg,#3dcb96,#0a8f60);color:#fff;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 5px 18px rgba(10,143,96,0.45),0 1px 0 rgba(255,255,255,0.35) inset;position:relative;overflow:hidden;}
.retry-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:18px 18px 0 0;}
.retry-btn:hover{transform:translateY(-2px);}

/* PROGRESS BAR (exercises) */
.ex-progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.ex-prog-label{font-size:12px;font-weight:700;color:var(--text-mid);}
.ex-prog-score{font-size:12px;font-weight:800;color:var(--text-dark);background:rgba(255,255,255,0.5);padding:2px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.7);}
.ex-track{height:10px;border-radius:10px;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.7);box-shadow:0 1px 4px rgba(100,160,200,0.15),0 1px 0 rgba(255,255,255,0.8) inset;margin-bottom:14px;overflow:hidden;}
.ex-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#3dcb96,#0a8f60);transition:width .4s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.ex-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);}

/* IRREGULAR VERBS SPECIFIC */
.flash-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.flash-counter{font-size:12px;font-weight:700;color:var(--text-light);background:rgba(255,255,255,0.5);padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.7);}
.flash-group{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.6);background:rgba(245,167,66,0.15);color:#8a4800;}

.flip-wrap{perspective:1000px;margin-bottom:14px;cursor:pointer;}
.flip-inner{position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);border-radius:22px;}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-front,.flip-back{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;}
.flip-back{position:absolute;inset:0;transform:rotateY(180deg);}
.flash-front{background:var(--glass-bg2);border:1px solid var(--glass-bdr);border-radius:22px;padding:2.5rem 1.5rem;text-align:center;box-shadow:0 8px 32px rgba(80,160,220,0.18),0 1.5px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;}
.flash-front::before{content:'';position:absolute;top:0;left:0;right:0;height:44%;background:linear-gradient(to bottom,rgba(255,255,255,0.42),rgba(255,255,255,0.06));border-radius:22px 22px 60% 60%/22px 22px 30px 30px;pointer-events:none;}
.flash-hint-txt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);margin-bottom:10px;}
.flash-verb{font-size:48px;font-weight:800;color:var(--text-dark);text-shadow:0 2px 0 rgba(255,255,255,0.8),0 4px 16px rgba(100,160,210,0.25);letter-spacing:-1px;margin-bottom:6px;}
.flash-trans{font-size:14px;font-weight:600;color:var(--text-light);font-style:italic;}
.flash-tap{font-size:12px;color:var(--text-light);margin-top:18px;font-weight:600;opacity:.7;}
.flash-back{background:linear-gradient(145deg,rgba(245,167,66,0.18),rgba(255,255,255,0.48));border:1px solid rgba(245,167,66,0.4);border-radius:22px;padding:1.8rem 1.5rem;text-align:center;box-shadow:0 8px 32px rgba(224,106,10,0.15),0 1.5px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;}
.flash-back::before{content:'';position:absolute;top:0;left:0;right:0;height:44%;background:linear-gradient(to bottom,rgba(255,255,255,0.42),rgba(255,255,255,0.06));border-radius:22px 22px 60% 60%/22px 22px 30px 30px;pointer-events:none;}
.back-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.back-cell{background:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.8);border-radius:14px;padding:12px 8px;box-shadow:0 2px 8px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.back-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:14px 14px 0 0;}
.back-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-light);margin-bottom:5px;}
.back-word{font-size:16px;font-weight:800;color:var(--text-dark);text-shadow:0 1px 0 rgba(255,255,255,0.8);}
.flash-nav{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.fnav-btn{padding:10px 18px;border-radius:14px;border:none;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.fnav-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:14px 14px 0 0;}
.fnav-prev{background:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.75);color:var(--text-mid);box-shadow:0 2px 8px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;justify-self:start;}
.fnav-next{background:linear-gradient(150deg,#f5a742,#e06a0a);color:#fff;box-shadow:0 4px 14px rgba(224,106,10,0.4),0 1px 0 rgba(255,255,255,0.35) inset;justify-self:end;}
.fnav-btn:hover{transform:translateY(-1px);}
.fnav-btn:disabled{opacity:.35;transform:none;cursor:default;}
.group-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.grp-btn{padding:5px 12px;border-radius:50px;border:1px solid rgba(255,255,255,0.72);background:rgba(255,255,255,0.38);color:var(--text-mid);font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;backdrop-filter:blur(6px);box-shadow:0 1px 4px rgba(100,160,200,0.1),0 1px 0 rgba(255,255,255,0.8) inset;}
.grp-btn.active{background:linear-gradient(135deg,#f5a742,#e06a0a);color:#fff;border-color:rgba(255,255,255,0.4);box-shadow:0 3px 12px rgba(224,106,10,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}
.fdot{width:8px;height:8px;border-radius:50%;background:rgba(180,210,230,0.4);border:1px solid rgba(255,255,255,0.6);transition:background .2s,transform .2s;flex-shrink:0;}
.fdot.seen{background:#f5a742;}
.fdot.cur{transform:scale(1.4);background:#e06a0a;}

.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;padding:11px 14px 11px 38px;border-radius:14px;border:1px solid rgba(255,255,255,0.75);background:rgba(255,255,255,0.55);font-size:14px;font-weight:600;color:var(--text-dark);font-family:'Nunito',sans-serif;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;outline:none;transition:all .15s;}
.search-input:focus{border-color:rgba(91,163,232,0.7);box-shadow:0 0 0 3px rgba(91,163,232,0.15);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);display:none;}
.verb-table{width:100%;border-collapse:separate;border-spacing:0 5px;}
.verb-table thead th{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);text-align:left;padding:5px 10px;}
.verb-row td{padding:9px 10px;background:rgba(255,255,255,0.45);border-top:1px solid rgba(255,255,255,0.75);border-bottom:1px solid rgba(255,255,255,0.45);font-size:13px;font-weight:700;color:var(--text-dark);}
.verb-row td:first-child{border-left:1px solid rgba(255,255,255,0.75);border-radius:12px 0 0 12px;}
.verb-row td:last-child{border-right:1px solid rgba(255,255,255,0.75);border-radius:0 12px 12px 0;color:var(--text-mid);font-size:12px;font-style:italic;}
.verb-row td:nth-child(2){color:var(--text-mid);}
.verb-row:hover td{background:rgba(255,255,255,0.65);}
.no-results{text-align:center;padding:2rem;font-size:14px;font-weight:700;color:var(--text-light);}

.three-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
.three-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-light);text-align:center;margin-bottom:4px;}
.three-input{width:100%;padding:10px 8px;border-radius:12px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.55);font-size:13px;font-weight:700;color:var(--text-dark);font-family:'Nunito',sans-serif;text-align:center;box-shadow:0 2px 6px rgba(100,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;outline:none;transition:all .15s;}
.three-input:focus{border-color:rgba(91,163,232,0.7);box-shadow:0 0 0 3px rgba(91,163,232,0.12);}
.three-input.correct{border-color:var(--correct-bdr);background:var(--correct-bg);color:var(--correct-txt);}
.three-input.wrong  {border-color:var(--wrong-bdr);  background:var(--wrong-bg);  color:var(--wrong-txt);}
.three-input:disabled{cursor:default;}
.three-check{width:100%;margin-top:10px;padding:11px;border-radius:14px;border:none;background:linear-gradient(150deg,#f5a742,#e06a0a);color:#fff;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(224,106,10,0.4),0 1px 0 rgba(255,255,255,0.35) inset;position:relative;overflow:hidden;}
.three-check::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:14px 14px 0 0;}
.three-check:hover{transform:translateY(-1px);}
.three-check:disabled{opacity:.5;cursor:default;transform:none;}

@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
.shake{animation:shake .35s ease;}
.pop  {animation:pop   .25s ease;}

/* ══════════════════════════════
   PAGE ROUTER
══════════════════════════════ */
let currentPage = 'sen';
const pages = ['sen','tq','ex','iv'];

function showPage(p){
  pages.forEach(id=>{
    document.getElementById('page-'+id).classList.toggle('active', id===p);
  });
  document.querySelectorAll('.page-btn').forEach((b,i)=>{
    b.classList.toggle('active', pages[i]===p);
  });
  currentPage = p;
  if(p==='ex' && !exStarted) { exStarted=true; exStartGame(); }
  if(p==='iv' && !ivInited)  { ivInited=true;  ivRenderFlash(); }
}

/* ── MENU ── */
function toggleMenu(){
  const m=document.getElementById('menuOverlay');
  m.classList.toggle('open');
}
function closeMenu(e){
  if(e.target===document.getElementById('menuOverlay'))
    document.getElementById('menuOverlay').classList.remove('open');
}
function menuGoTo(p){
  document.getElementById('menuOverlay').classList.remove('open');
  showPage(p);
}

  {b:'drive',p:'drove',pp:'driven',t:'conducir',g:'A-B'},{b:'eat',p:'ate',pp:'eaten',t:'comer',g:'A-B'},{b:'fall',p:'fell',pp:'fallen',t:'caer',g:'A-B'},
  {b:'feel',p:'felt',pp:'felt',t:'sentir',g:'B-B'},{b:'fight',p:'fought',pp:'fought',t:'pelear',g:'B-B'},{b:'find',p:'found',pp:'found',t:'encontrar',g:'B-B'},

  {b:'hang',p:'hung',pp:'hung',t:'colgar',g:'B-B'},{b:'have',p:'had',pp:'had',t:'tener',g:'B-B'},{b:'hear',p:'heard',pp:'heard',t:'oír',g:'B-B'},
  {b:'hide',p:'hid',pp:'hidden',t:'esconder',g:'A-B'},{b:'hit',p:'hit',pp:'hit',t:'golpear',g:'A-A'},{b:'hold',p:'held',pp:'held',t:'sostener',g:'B-B'},
  {b:'hurt',p:'hurt',pp:'hurt',t:'herir',g:'A-A'},{b:'keep',p:'kept',pp:'kept',t:'guardar',g:'B-B'},{b:'know',p:'knew',pp:'known',t:'saber / conocer',g:'A-B'},
  {b:'lay',p:'laid',pp:'laid',t:'poner (huevos)',g:'B-B'},{b:'lead',p:'led',pp:'led',t:'liderar',g:'B-B'},{b:'learn',p:'learned / learnt',pp:'learned / learnt',t:'aprender',g:'B-B'},
  {b:'leave',p:'left',pp:'left',t:'irse / dejar',g:'B-B'},{b:'lend',p:'lent',pp:'lent',t:'prestar',g:'B-B'},{b:'let',p:'let',pp:'let',t:'dejar / permitir',g:'A-A'},
  {b:'lie',p:'lay',pp:'lain',t:'estar tumbado',g:'A-B'},{b:'light',p:'lit',pp:'lit',t:'encender',g:'B-B'},{b:'lose',p:'lost',pp:'lost',t:'perder',g:'B-B'},
  {b:'make',p:'made',pp:'made',t:'hacer / fabricar',g:'B-B'},{b:'mean',p:'meant',pp:'meant',t:'significar',g:'B-B'},{b:'meet',p:'met',pp:'met',t:'conocer / reunirse',g:'B-B'},
  {b:'pay',p:'paid',pp:'paid',t:'pagar',g:'B-B'},{b:'put',p:'put',pp:'put',t:'poner',g:'A-A'},{b:'quit',p:'quit',pp:'quit',t:'dejar / renunciar',g:'A-A'},
  {b:'read',p:'read',pp:'read',t:'leer',g:'A-A'},{b:'ride',p:'rode',pp:'ridden',t:'montar',g:'A-B'},{b:'ring',p:'rang',pp:'rung',t:'sonar / llamar',g:'A-B'},
  {b:'rise',p:'rose',pp:'risen',t:'levantarse',g:'A-B'},{b:'run',p:'ran',pp:'run',t:'correr',g:'A-A'},{b:'say',p:'said',pp:'said',t:'decir',g:'B-B'},
  {b:'see',p:'saw',pp:'seen',t:'ver',g:'A-B'},{b:'seek',p:'sought',pp:'sought',t:'buscar',g:'B-B'},{b:'sell',p:'sold',pp:'sold',t:'vender',g:'B-B'},
  {b:'send',p:'sent',pp:'sent',t:'enviar',g:'B-B'},{b:'set',p:'set',pp:'set',t:'poner / fijar',g:'A-A'},{b:'shake',p:'shook',pp:'shaken',t:'sacudir',g:'A-B'},
  {b:'shoot',p:'shot',pp:'shot',t:'disparar',g:'B-B'},{b:'show',p:'showed',pp:'shown',t:'mostrar',g:'A-B'},{b:'shut',p:'shut',pp:'shut',t:'cerrar',g:'A-A'},

  {b:'sleep',p:'slept',pp:'slept',t:'dormir',g:'B-B'},{b:'speak',p:'spoke',pp:'spoken',t:'hablar',g:'A-B'},{b:'spend',p:'spent',pp:'spent',t:'gastar / pasar',g:'B-B'},
  {b:'spill',p:'spilled / spilt',pp:'spilled / spilt',t:'derramar',g:'B-B'},{b:'spread',p:'spread',pp:'spread',t:'esparcir',g:'A-A'},{b:'stand',p:'stood',pp:'stood',t:'estar de pie',g:'B-B'},
  {b:'steal',p:'stole',pp:'stolen',t:'robar',g:'A-B'},{b:'stick',p:'stuck',pp:'stuck',t:'pegar / adherir',g:'B-B'},{b:'strike',p:'struck',pp:'struck',t:'golpear',g:'B-B'},
  {b:'swim',p:'swam',pp:'swum',t:'nadar',g:'A-B'},{b:'swing',p:'swung',pp:'swung',t:'balancear',g:'B-B'},{b:'take',p:'took',pp:'taken',t:'tomar',g:'A-B'},
  {b:'teach',p:'taught',pp:'taught',t:'enseñar',g:'B-B'},{b:'tell',p:'told',pp:'told',t:'contar / decir',g:'B-B'},{b:'think',p:'thought',pp:'thought',t:'pensar',g:'B-B'},
  {b:'throw',p:'threw',pp:'thrown',t:'lanzar',g:'A-B'},{b:'understand',p:'understood',pp:'understood',t:'entender',g:'B-B'},{b:'wake',p:'woke',pp:'woken',t:'despertar',g:'A-B'},
  {b:'wear',p:'wore',pp:'worn',t:'llevar puesto',g:'A-B'},{b:'win',p:'won',pp:'won',t:'ganar',g:'B-B'},{b:'write',p:'wrote',pp:'written',t:'escribir',g:'A-B'},
];
const IV_GROUP_LABELS={'A-A':'Igual en las 3 formas','A-B':'Las 3 formas distintas','B-B':'Past = Past Participle'};
function ivShuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function ivNorm(s){return s.toLowerCase().replace(/[^a-z\/\s]/g,'').replace(/\s+/g,' ').trim();}
function ivScroll(){document.getElementById('iv-scroll').scrollTo({top:0,behavior:'smooth'});}

function ivSetMode(m){
  ivMode=m;
  document.querySelectorAll('#page-iv .inner-nav .nav-btn').forEach((b,i)=>b.classList.toggle('active',['flash','table','ex'][i]===m));
  if(m==='flash') ivRenderFlash();
  if(m==='table') ivRenderTable();
  if(m==='ex')    ivStartEx();
  ivScroll();
}
function ivGetFlashList(){ return ivFlashGroup==='all'?[...VERBS]:VERBS.filter(v=>v.g===ivFlashGroup); }
function ivRenderFlash(){
  ivFlashList=ivGetFlashList(); if(ivFlashIdx>=ivFlashList.length)ivFlashIdx=0; ivFlashFlipped=false;
  const app=document.getElementById('iv-app'), v=ivFlashList[ivFlashIdx], total=ivFlashList.length;
  const maxDots=Math.min(total,30); let dots='';
  for(let i=0;i<maxDots;i++){let cls='fdot';if(i===ivFlashIdx%maxDots)cls+=' cur';else if(ivFlashSeen.has(ivFlashList[i]?.b))cls+=' seen';dots+=`<div class="${cls}"></div>`;}
  const grpBtns=['all','A-A','A-B','B-B'].map(g=>`<button class="grp-btn${ivFlashGroup===g?' active':''}" onclick="ivSetGroup('${g}')">${g==='all'?'Todos':g}</button>`).join('');
  app.innerHTML=`
    <div class="group-row">${grpBtns}</div>
    <div class="flash-meta"><span class="flash-counter">${ivFlashIdx+1} / ${total}</span><span class="flash-group">${ivFlashGroup==='all'?'Todos los grupos':IV_GROUP_LABELS[ivFlashGroup]}</span></div>
    <div class="progress">${dots}</div>
    <div class="flip-wrap" onclick="ivFlip()">
      <div class="flip-inner" id="ivFlipInner">
        <div class="flip-front"><div class="flash-front"><div class="flash-hint-txt">Base form</div><div class="flash-verb">${v.b}</div><div class="flash-trans">${v.t}</div><div class="flash-tap">Toca para ver las formas ↓</div></div></div>
        <div class="flip-back"><div class="flash-back">
          <div class="flash-hint-txt" style="margin-bottom:12px;">Formas del verbo</div>
          <div class="back-grid">
            <div class="back-cell"><div class="back-label">Base</div><div class="back-word">${v.b}</div></div>
            <div class="back-cell"><div class="back-label">Past Simple</div><div class="back-word" style="font-size:${v.p.length>8?'13px':'16px'}">${v.p}</div></div>
            <div class="back-cell"><div class="back-label">Past Participle</div><div class="back-word" style="font-size:${v.pp.length>8?'13px':'16px'}">${v.pp}</div></div>
          </div>
          <div style="font-size:13px;color:var(--text-light);font-weight:600;font-style:italic;">${v.t}</div>
        </div></div>
      </div>
    </div>
    <div class="flash-nav">
      <button class="fnav-btn fnav-prev" onclick="ivFlashNav(-1)" ${ivFlashIdx===0?'disabled':''}>← Anterior</button>
      <span style="font-size:11px;font-weight:700;color:var(--text-light);">${ivFlashIdx+1}/${total}</span>
      <button class="fnav-btn fnav-next" onclick="ivFlashNav(1)">${ivFlashIdx===total-1?'Reiniciar 🔄':'Siguiente →'}</button>
    </div>
    <div style="margin-top:10px;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.7);border-radius:14px;padding:10px 14px;font-size:12.5px;color:var(--text-mid);font-weight:600;">
      💡 <strong>Grupo ${v.g}:</strong> ${IV_GROUP_LABELS[v.g]}
    </div>`;
}
function ivFlip(){ivFlashFlipped=!ivFlashFlipped;document.getElementById('ivFlipInner').classList.toggle('flipped',ivFlashFlipped);ivFlashSeen.add(ivFlashList[ivFlashIdx].b);}
function ivFlashNav(dir){const total=ivFlashList.length;if(dir===1&&ivFlashIdx===total-1){ivFlashIdx=0;ivFlashSeen.clear();}else ivFlashIdx=Math.max(0,Math.min(total-1,ivFlashIdx+dir));ivRenderFlash();}
function ivSetGroup(g){ivFlashGroup=g;ivFlashIdx=0;ivFlashSeen.clear();ivRenderFlash();}

function ivRenderTable(filter=''){
  const app=document.getElementById('iv-app'),q=filter.toLowerCase().trim();
  const rows=VERBS.filter(v=>!q||v.b.includes(q)||v.p.includes(q)||v.pp.includes(q)||v.t.includes(q));
  const trs=rows.length?rows.map((v,i)=>`<tr class="verb-row" style="animation-delay:${i*.012}s"><td><strong>${v.b}</strong></td><td>${v.p}</td><td>${v.pp}</td><td>${v.t}</td></tr>`).join(''):`<tr><td colspan="4" class="no-results">No se encontraron verbos para "${filter}"</td></tr>`;
  app.innerHTML=`
    <div class="card" style="margin-bottom:12px;"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);margin-bottom:8px;">📋 Referencia completa · ${VERBS.length} verbos irregulares</div>
    <div style="font-size:13px;font-weight:600;color:var(--text-mid);line-height:1.65;"><strong style="color:var(--text-dark);">A-A</strong> — igual en las 3 formas (cut/cut/cut) &nbsp;·&nbsp; <strong style="color:var(--text-dark);">B-B</strong> — past = participle (bring/brought/brought) &nbsp;·&nbsp; <strong style="color:var(--text-dark);">A-B</strong> — las 3 formas distintas (go/went/gone)</div></div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="ivSearch" type="text" placeholder="Buscar verbo…" value="${filter}" oninput="ivRenderTable(this.value)" autocomplete="off" spellcheck="false"><button class="search-clear" onclick="ivClearSearch()" style="${filter?'display:block':''}">✕</button></div>
    <table class="verb-table"><thead><tr><th>Base form</th><th>Past simple</th><th>Past participle</th><th>Traducción</th></tr></thead><tbody>${trs}</tbody></table>`;
}
function ivClearSearch(){ivRenderTable('');document.getElementById('ivSearch').focus();}

function ivBuildEx(){
  const qs=[],pool=ivShuffle([...VERBS]);
  pool.slice(0,8).forEach(v=>{const ws=ivShuffle(VERBS.filter(x=>x.b!==v.b)).slice(0,3).map(x=>x.p);const opts=ivShuffle([v.p,...ws]);qs.push({type:'mc',sub:'past',q:`¿Cuál es el <strong>Past Simple</strong> de "<strong>${v.b}</strong>" (${v.t})?`,opts,ans:v.p,exp:`<strong>${v.b}</strong> → <strong>${v.p}</strong> → ${v.pp}`,verb:v});});
  pool.slice(8,16).forEach(v=>{const ws=ivShuffle(VERBS.filter(x=>x.b!==v.b)).slice(0,3).map(x=>x.pp);const opts=ivShuffle([v.pp,...ws]);qs.push({type:'mc',sub:'pp',q:`¿Cuál es el <strong>Past Participle</strong> de "<strong>${v.b}</strong>" (${v.t})?`,opts,ans:v.pp,exp:`<strong>${v.b}</strong> → ${v.p} → <strong>${v.pp}</strong>`,verb:v});});
  pool.slice(16,22).forEach(v=>{qs.push({type:'fill',sub:'past',q:`Escribe el <strong>Past Simple</strong> de: <strong>${v.b}</strong> (${v.t})`,ans:v.p,exp:`<strong>${v.b}</strong> → <strong>${v.p}</strong> → ${v.pp}`,verb:v});});
  pool.slice(22,28).forEach(v=>{qs.push({type:'fill',sub:'base',q:`El Past Simple es "<strong>${v.p}</strong>". ¿Cuál es la <strong>forma base</strong>?`,ans:v.b,exp:`<strong>${v.b}</strong> → ${v.p} → ${v.pp}`,verb:v});});
  pool.slice(28,38).forEach(v=>{qs.push({type:'three',q:`Escribe las <strong>3 formas</strong> de: <strong>${v.b}</strong> — ${v.t}`,verb:v,exp:`<strong>${v.b}</strong> → <strong>${v.p}</strong> → <strong>${v.pp}</strong>`});});
  return ivShuffle(qs);
}
function ivStartEx(){ivExQs=ivBuildEx();ivExCur=0;ivExScore=0;ivExAnswered=false;ivRenderEx();}
function ivRenderEx(){
  ivExAnswered=false;const app=document.getElementById('iv-app');const total=ivExQs.length,pct=Math.round((ivExCur/total)*100),q=ivExQs[ivExCur];
  let badgeHtml='',bodyHtml='';
  if(q.type==='mc'){badgeHtml=`<div class="type-badge badge-mc"><span class="badge-dot"></span>Opción múltiple · ${q.sub==='past'?'Past Simple':'Past Participle'}</div>`;bodyHtml=`<div class="options">${q.opts.map((o,i)=>`<button class="opt-btn" id="ivopt${i}" onclick="ivAnswerMC(${i})">${o}</button>`).join('')}</div>`;}
  else if(q.type==='fill'){badgeHtml=`<div class="type-badge badge-fill"><span class="badge-dot"></span>Completar · ${q.sub==='past'?'Past Simple':'Base form'}</div>`;bodyHtml=`<div class="fill-row"><input class="fill-input" id="ivFillInput" type="text" placeholder="Tu respuesta…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')ivCheckFill()"><button class="check-btn" id="ivCheckBtn" onclick="ivCheckFill()">✓</button></div>`;}
  else if(q.type==='three'){badgeHtml=`<div class="type-badge badge-3"><span class="badge-dot"></span>Las 3 formas</div>`;bodyHtml=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:4px;"><div class="three-label">Base form</div><div class="three-label">Past Simple</div><div class="three-label">Past Participle</div></div><div class="three-grid"><input class="three-input" id="ivT0" type="text" value="${q.verb.b}" disabled style="opacity:.7;cursor:default;"><input class="three-input" id="ivT1" type="text" placeholder="Past simple…" autocomplete="off" autocorrect="off" spellcheck="false"><input class="three-input" id="ivT2" type="text" placeholder="Past participle…" autocomplete="off" autocorrect="off" spellcheck="false"></div><button class="three-check" id="ivCheckBtn" onclick="ivCheckThree()">✓ Verificar las 3 formas</button>`;}
  app.innerHTML=`
    <div class="ex-progress-row"><span class="ex-prog-label">Pregunta ${Math.min(ivExCur+1,total)} de ${total}</span><span class="ex-prog-score">✓ ${ivExScore}</span></div>
    <div class="ex-track"><div class="ex-fill" style="width:${pct}%"></div></div>
    ${badgeHtml}<div class="card"><div class="q-num">Pregunta ${ivExCur+1} de ${total}</div><div class="q-text">${q.q}</div>${bodyHtml}<div class="feedback" id="ivFb"></div><button class="next-btn" id="ivNext" onclick="ivNextEx()">${ivExCur===total-1?'Ver resultados →':'Siguiente →'}</button></div>`;
  if(q.type==='fill')document.getElementById('ivFillInput').focus();
  if(q.type==='three')document.getElementById('ivT1').focus();
}
function ivShowFeedback(ok,exp){const fb=document.getElementById('ivFb');fb.className=`feedback show ${ok?'correct':'wrong'}`;fb.innerHTML=(ok?'✓ ¡Correcto! ':'✗ Incorrecto. ')+exp;document.getElementById('ivNext').classList.add('show');if(ok){ivExScore++;playGana();}else{playPerder();}ivExAnswered=true;}
function ivAnswerMC(idx){if(ivExAnswered)return;const q=ivExQs[ivExCur];const btns=document.querySelectorAll('#iv-app .opt-btn');btns.forEach(b=>b.disabled=true);const ci=q.opts.indexOf(q.ans);btns[ci].classList.add('correct');if(q.opts[idx]!==q.ans){btns[idx].classList.add('wrong');}else btns[idx].classList.add('pop');btns.forEach((b,i)=>{if(i!==idx&&i!==ci)b.classList.add('reveal');});ivShowFeedback(q.opts[idx]===q.ans,q.exp);}
function ivCheckFill(){if(ivExAnswered)return;const input=document.getElementById('ivFillInput');const val=input.value.trim();if(!val){input.classList.add('shake');setTimeout(()=>input.classList.remove('shake'),400);return;}const q=ivExQs[ivExCur];const accepted=q.ans.split('/').map(x=>x.trim().toLowerCase());const ok=accepted.includes(ivNorm(val));input.disabled=true;document.getElementById('ivCheckBtn').disabled=true;input.classList.add(ok?'correct':'wrong');if(!ok)input.value=`${val}  →  ${q.ans}`;if(ok)input.classList.add('pop');else input.classList.add('shake');setTimeout(()=>input.classList.remove('shake','pop'),400);ivShowFeedback(ok,q.exp);}
function ivCheckThree(){if(ivExAnswered)return;const q=ivExQs[ivExCur];const v=q.verb;const i1=document.getElementById('ivT1'),i2=document.getElementById('ivT2');if(!i1.value.trim()||!i2.value.trim()){[i1,i2].forEach(x=>{if(!x.value.trim()){x.classList.add('shake');setTimeout(()=>x.classList.remove('shake'),400);}});return;}const acc1=v.p.split('/').map(x=>x.trim().toLowerCase()),acc2=v.pp.split('/').map(x=>x.trim().toLowerCase());const c1=acc1.includes(ivNorm(i1.value)),c2=acc2.includes(ivNorm(i2.value));i1.disabled=i2.disabled=true;document.getElementById('ivCheckBtn').disabled=true;i1.classList.add(c1?'correct':'wrong');i2.classList.add(c2?'correct':'wrong');if(!c1)i1.value=`${i1.value}→${v.p}`;if(!c2)i2.value=`${i2.value}→${v.pp}`;ivShowFeedback(c1&&c2,q.exp);}
function ivNextEx(){ivExCur++;if(ivExCur>=ivExQs.length){ivShowResults();return;}ivRenderEx();ivScroll();}
function ivShowResults(){
  const total=ivExQs.length,pct=Math.round((ivExScore/total)*100),stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐',msg=pct>=90?'¡Excelente!':pct>=70?'¡Muy bien!':'¡Sigue practicando!';
  document.getElementById('iv-app').innerHTML=`<div class="card results"><div class="results-stars">${stars}</div><div class="results-score">${pct}%</div><div class="results-label">${msg}</div><div class="results-sub">${ivExScore} de ${total} respuestas correctas</div><div class="breakdown"><div class="pill pill-c">✓ ${ivExScore} correctas</div><div class="pill pill-w">✗ ${total-ivExScore} incorrectas</div></div><button class="retry-btn" onclick="ivStartEx()">↺ Intentar de nuevo</button><button style="width:100%;margin-top:8px;padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,0.75);background:rgba(255,255,255,0.5);color:var(--text-mid);font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 2px 8px rgba(100,160,210,0.12);" onclick="ivSetMode('flash')">📇 Repasar fichas</button></div>`;
}


/* ══ WATER DROP on buttons ══ */
document.addEventListener('click', function(e){
  const btn = e.target.closest('button, .card-tab, .sense-tab, .nav-btn, .page-btn, .ch-btn, .grp-btn, .fnav-btn, .newara-logo, .opt-btn, .tf-btn, .check-btn, .next-btn, .retry-btn, .three-check, .tab-btn');
  if(!btn) return;
  if(btn.classList.contains('menu-goto')) return;
  if(btn.classList.contains('menu-download')) return;
  playWater();
});

/* INIT */
senRender();
tqRender();
</script>
